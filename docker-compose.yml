services:
  manjyun-blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: manjyun-blog
    restart: unless-stopped
    network_mode: bridge
    user: "0:0"
    ports:
      - "4482:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      DATA_DIR: /app/data
      APP_URL: http://localhost:4482
      GITHUB_OWNER: manjyunme-glitch
      GITHUB_REPO: ManJyun-Blog
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - /share/DockerData/ManJyun-Blog:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
